<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Учебный проект</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            font-family: 'Roboto', sans-serif;
            background-color: #f4f7f6; /* Светлый фон */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }

        .container {
            text-align: center;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            background-color: #ffffff;
            max-width: 600px;
            width: 90%;
        }

        h1 {
            font-size: 2.5rem;
            letter-spacing: -1px;
            color: #2c3e50;
            margin-bottom: 10px;
        }

        p.subtitle {
            font-size: 1.1rem;
            color: #7f8c8d;
            margin-bottom: 30px;
        }

        .telegram-btn {
            display: inline-block;
            padding: 15px 35px;
            font-size: 1.1rem;
            font-weight: bold;
            color: white !important;
            text-decoration: none;
            border-radius: 50px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            background-image: linear-gradient(to right, #0088cc, #00b4f0); /* Градиент Telegram */
            box-shadow: 0 5px 15px rgba(0, 136, 204, 0.4);
        }

        .telegram-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 136, 204, 0.5);
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 2rem;
            }
            .telegram-btn {
                padding: 12px 30px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Добро пожаловать!</h1>
        <p class="subtitle">Это учебный сайт для практической работы.</p>
        
        <a href="https://web.telegram.org/k/#@MisoshiBot" target="_blank" class="telegram-btn">
            Перейти в Telegram-бота
        </a>

        <p style="margin-top: 40px; font-style: italic; font-size: 0.9em; color: #999;">
            Учебный проект. Создан в рамках производственной практики.
        </p>
    </div>

</body>
</html>
